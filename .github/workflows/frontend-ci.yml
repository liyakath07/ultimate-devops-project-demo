name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "src/frontend/**"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -t frontend:${{ github.sha }} \
            -f src/frontend/Dockerfile \
            .
  
